<html>
<body>

<canvas id="clock" width="400" height="200"></canvas>

<script>
const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

function drawClock() {

    ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous time

    const now = new Date();               // Get current time
    const time = now.toLocaleTimeString(); // Format time

    ctx.font = "40px Arial";
    ctx.fillStyle = "green";
    ctx.fillText(time, 70, 120); // Draw time
}

// Update every second
setInterval(drawClock, 1000);

</script>

</body>
</html>

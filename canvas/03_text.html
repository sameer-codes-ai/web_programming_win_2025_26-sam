<html>

<body>
    <canvas id="c3" width="400" height="200"></canvas>
    <script>
        const canvas = document.getElementById("c3");
        const ctx = canvas.getContext("2d");
        ctx.font = "30px Arial"; // Set font size and family
        ctx.fillStyle = "black"; // Set text color
        ctx.fillText("Hello Canvas", 80, 100); // Draw text at (x, y)
    </script>
</body>

</html>
